version: "3.9"

services:
  kundli:
    build: .
    container_name: jyotish-dashboard
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - SE_EPHE_PATH=/app/ephe
      - FLASK_ENV=production
      - PORT=5000
    volumes:
      # Persist ephemeris data between rebuilds
      - ephe_data:/app/ephe
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ephe_data:
